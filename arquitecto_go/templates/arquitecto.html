<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arquitecto de DB - UNACH</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #003366; color: white; height: 100vh; padding: 20px; }
        .content { flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #003366; border-bottom: 2px solid #C0A060; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: #003366; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #C0A060; color: #003366; }
        .console { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; font-family: monospace; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>UNACH</h3>
        <p>Modo: Arquitecto (Compiladores)</p>
        <hr>
        <small>Este módulo genera y valida DDL automáticamente.</small>
    </div>
    <div class="content">
        <div class="card">
            <h2>🛠️ Generador de Estructuras (DDL)</h2>
            <form action="/analizar" method="POST">
                <div class="form-group">
                    <label>Nombre de la Tabla:</label>
                    <input type="text" name="tabla" placeholder="ej. docentes" required>
                </div>
                <div class="form-group">
                    <label>Definición de Columnas (Simulado):</label>
                    <p style="font-size: 0.8em; color: #666;">Ejemplo: id SERIAL PRIMARY KEY, nombre VARCHAR(100), rfc VARCHAR(13)</p>
                    <input type="text" name="columnas" placeholder="id SERIAL PRIMARY KEY, rfc VARCHAR(13), banco VARCHAR(50)" required>
                </div>
                <button type="submit" class="btn">Analizar y Crear Tabla</button>
            </form>
        </div>
    </div>
</body>
</html>
